# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo on Render → New → Blueprint, or create a Web Service manually with the same build/start commands.
services:
  - type: web
    name: school-cms-api
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/spring-boot-jpa-postgresql-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
