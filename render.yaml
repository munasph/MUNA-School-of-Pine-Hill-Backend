# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo on Render → New → Blueprint, or create a Web Service manually.
# Language: Docker (uses Dockerfile in repo root)
services:
  - type: web
    name: school-cms-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      # Public Angular URL — used to build email verification / reset links
      - key: APP_FRONTEND_BASE_URL
        sync: false
      # Email (SMTP). Leave APP_MAIL_ENABLED=false to log links instead of sending.
      - key: APP_MAIL_ENABLED
        value: "false"
      - key: APP_MAIL_FROM
        sync: false
      - key: APP_MAIL_HOST
        sync: false
      - key: APP_MAIL_USERNAME
        sync: false
      - key: APP_MAIL_PASSWORD
        sync: false
