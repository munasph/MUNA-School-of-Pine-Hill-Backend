# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo on Render → New → Blueprint, or create a Web Service manually.
# Language: Docker (uses Dockerfile in repo root)
services:
  - type: web
    name: school-cms-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
