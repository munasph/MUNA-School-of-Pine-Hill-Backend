# Server — Render injects PORT at runtime
server.port=${PORT:8080}

# Load local secrets from project-root .env (gitignored; optional so CI/Render still work)
# If tables hit localhost instead of Neon, run:  source .env && ./mvnw spring-boot:run
# Or use:  ./run-dev.sh
spring.config.import=optional:file:./.env[.properties]

# PostgreSQL — set DATABASE_* in .env locally or Render env vars in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/testdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:123}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Schema is managed by Liquibase — Hibernate only validates on startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Liquibase runs automatically on startup (local + Render deploys)
# Add new SQL files under db/changelog/changes/ and include them in db.changelog-master.yaml
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Dev admin credentials (replace with user table + password hashing in production)
app.admin.email=${ADMIN_EMAIL:admin@school.example}
app.admin.password=${ADMIN_PASSWORD:admin123}

# JWT — set APP_JWT_SECRET to a long random string in production (min 32 chars)
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-use-32-char-secret-key!!}
# Admin tokens are short-lived (8h); portal/parent tokens last longer (7d)
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:28800000}
app.jwt.portal-expiration-ms=${APP_JWT_PORTAL_EXPIRATION_MS:604800000}

# CORS — comma-separated origins for Angular dev + Vercel (set APP_CORS_ALLOWED_ORIGINS on Render)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8081}

# Public base URL of the Angular app — used to build email links (verification, reset)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# Account security
app.security.max-failed-logins=${APP_MAX_FAILED_LOGINS:5}
app.security.lockout-minutes=${APP_LOCKOUT_MINUTES:15}
app.security.email-token-ttl-minutes=${APP_EMAIL_TOKEN_TTL_MINUTES:1440}
app.security.reset-token-ttl-minutes=${APP_RESET_TOKEN_TTL_MINUTES:60}
app.security.magic-link-ttl-minutes=${APP_MAGIC_LINK_TTL_MINUTES:15}

# Portal login methods — toggle each independently. The frontend reads these from
# GET /api/portal/auth/methods and shows only the enabled options.
app.auth.password-enabled=${APP_AUTH_PASSWORD_ENABLED:true}
app.auth.magic-link-enabled=${APP_AUTH_MAGIC_LINK_ENABLED:true}
# Google sign-in is scaffolded but off until you provide an OAuth client id.
app.auth.google-enabled=${APP_AUTH_GOOGLE_ENABLED:false}
app.auth.google-client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}

# Email (SMTP). If APP_MAIL_HOST is unset, emails are logged to the console instead of sent.
app.mail.from=${APP_MAIL_FROM:no-reply@munasph.org}
app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${APP_MAIL_HOST:}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_SMTP_STARTTLS:true}
